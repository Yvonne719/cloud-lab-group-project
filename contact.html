<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page - Cloud Word of the Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
  <nav>
    <span class="logo">
  <img src="images/cloud-logo.png" alt="cloud logo" class="logo-img" />
  CloudWordOfTheDay
</span>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul> 
  </nav>

  <main class="contact-main">
    <h1 class="contact-titles">Have Any Thoughts? Contact Us</h1>

    <div class="contact-layout">
        <div class="contact-card">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Akua Ampong">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="aampong@gmail.com">   
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" placeholder="Let us know your thoughts"></textarea>
        </div>
    
    <p id="error-msg"></p>
        <button onclick="validateForm()">Send</button>
        </div>
    <div class="contact-image">
      <img src="images/contact-page-image.jpg" alt="contact illustration" />

        
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
